<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cislunar Gateway — Site Selection Intelligence for Aerospace & Defense</title>
<meta name="description" content="The first intelligence platform built exclusively for aerospace and defense companies evaluating U.S. market entry and expansion.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #0a1628;
    --deep: #060E1C;
    --cyan: #00d4ff;
    --cyan-muted: #007A8F;
    --gold: #C9950A;
    --white: #ffffff;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--deep);
    color: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }

  /* Subtle background glow */
  body::before {
    content: '';
    position: absolute;
    top: -30%; right: -20%;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(0,212,255,0.04) 0%, transparent 65%);
    border-radius: 50%;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: absolute;
    bottom: -20%; left: -15%;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(201,149,10,0.03) 0%, transparent 65%);
    border-radius: 50%;
    pointer-events: none;
  }

  .container {
    text-align: center;
    max-width: 560px;
    padding: 40px 24px;
    position: relative;
    z-index: 1;
  }

  /* A2 orbital mark */
  .orbital {
    margin-bottom: 40px;
  }

  .wordmark {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 8px;
  }
  .wordmark span {
    color: var(--cyan);
  }

  .product-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 42px;
    letter-spacing: -0.5px;
    margin-bottom: 20px;
    line-height: 1.1;
  }

  .tagline {
    font-size: 17px;
    font-weight: 300;
    color: rgba(255,255,255,0.55);
    line-height: 1.6;
    margin-bottom: 40px;
    max-width: 440px;
    margin-left: auto;
    margin-right: auto;
  }

  .divider {
    width: 48px;
    height: 1px;
    background: rgba(255,255,255,0.12);
    margin: 0 auto 32px;
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 32px;
  }
  .status-dot {
    width: 6px;
    height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .contact {
    display: block;
    margin-top: 8px;
  }
  .contact a {
    color: var(--cyan);
    text-decoration: none;
    font-size: 15px;
    font-weight: 400;
    transition: color 0.2s;
  }
  .contact a:hover {
    color: var(--white);
  }

  .footer {
    position: fixed;
    bottom: 24px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 11px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 0.5px;
  }

  @media (max-width: 480px) {
    .product-name { font-size: 32px; }
    .tagline { font-size: 15px; }
    .orbital svg { width: 52px; height: 52px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- A2 orbital mark — cyan for Cislunar brand -->
  <div class="orbital">
    <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="30" cy="30" r="8" fill="#00d4ff"/>
      <path d="M30 6 A24 24 0 0 1 54 30" stroke="#00d4ff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <circle cx="54" cy="30" r="3" fill="#00d4ff"/>
      <path d="M30 6 A24 24 0 0 0 6 30" stroke="rgba(0,212,255,0.15)" stroke-width="1.5" fill="none" stroke-dasharray="4 4"/>
    </svg>
  </div>

  <div class="wordmark">The Cislunar <span>Group</span></div>

  <h1 class="product-name">Gateway</h1>

  <p class="tagline">Site selection intelligence built exclusively for aerospace and defense companies evaluating U.S. market entry and expansion.</p>

  <div class="divider"></div>

  <div class="status">
    <span class="status-dot"></span>
    Launching Spring 2026
  </div>

  <div class="contact">
    <a href="https://cislunar.eu">cislunar.eu →</a>
  </div>

</div>

<div class="footer">© 2026 The Cislunar Group. All rights reserved.</div>

</body>
</html>
